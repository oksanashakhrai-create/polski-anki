<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="PL-ENG Anki">
<meta name="mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#0f0f1a">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<title>PL-ENG Anki Cards</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#0f0f1a;--card:#1a1a2e;--card2:#16213e;--accent:#e94560;--accent2:#0f3460;--green:#00b894;--orange:#fdcb6e;--red:#e17055;--text:#eee;--text2:#aaa;--shadow:0 8px 32px rgba(0,0,0,.4)}
body{font-family:'Segoe UI',system-ui,-apple-system,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden}
.app{max-width:600px;margin:0 auto;padding:16px;padding-top:env(safe-area-inset-top, 20px);min-height:100vh;display:flex;flex-direction:column}
.lang-toggle{display:flex;gap:8px;justify-content:center;margin-bottom:8px;margin-top:4px}
.lang-btn{padding:8px 18px;border:2px solid var(--card2);border-radius:20px;background:transparent;color:var(--text2);cursor:pointer;font-size:.85em;font-weight:600;transition:.2s}
.lang-btn:hover{border-color:var(--accent)}
.lang-btn.active{border-color:var(--accent);color:var(--text);background:rgba(233,69,96,.18)}
.header{text-align:center;padding:6px 0 4px}
.header h1{font-size:1.6em;background:linear-gradient(135deg,#e94560,#0f3460);-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:4px}
.header .sub{color:var(--text2);font-size:.85em}
.stats-bar{display:flex;gap:8px;margin:8px 0;flex-wrap:wrap}
.stat{flex:1;min-width:80px;background:var(--card);border-radius:12px;padding:10px;text-align:center}
.stat .num{font-size:1.4em;font-weight:700}
.stat .label{font-size:.7em;color:var(--text2);text-transform:uppercase;letter-spacing:1px}
.stat.green .num{color:var(--green)}
.stat.orange .num{color:var(--orange)}
.stat.red .num{color:var(--red)}
.modes{display:flex;gap:8px;margin:6px 0;flex-wrap:wrap}
.mode-btn{flex:1;min-width:100px;padding:10px 8px;border:none;border-radius:10px;background:var(--card);color:var(--text);cursor:pointer;font-size:.8em;transition:.2s;border:2px solid transparent}
.mode-btn:hover{border-color:var(--accent)}
.mode-btn.active{background:var(--accent);border-color:var(--accent)}
.mode-btn .icon{font-size:1.3em;display:block;margin-bottom:4px}
.directions{display:flex;gap:6px;margin:6px 0 4px;justify-content:center}
.dir-btn{padding:6px 14px;border:2px solid var(--card2);border-radius:20px;background:transparent;color:var(--text2);cursor:pointer;font-size:.75em;transition:.2s}
.dir-btn:hover{border-color:var(--accent)}
.dir-btn.active{border-color:var(--accent);color:var(--text);background:rgba(233,69,96,.15)}
.card-container{display:flex;align-items:flex-start;justify-content:center;perspective:1000px;margin:4px 0;padding-top:8px}
.flashcard{width:100%;max-width:500px;height:350px;position:relative;cursor:pointer;transform-style:preserve-3d;transition:transform .5s cubic-bezier(.4,.2,.2,1)}
.flashcard.flipped{transform:rotateY(180deg)}
.card-face{position:absolute;inset:0;backface-visibility:hidden;border-radius:20px;display:flex;flex-direction:column;padding:14px 20px 20px;text-align:center;overflow-y:auto}
.card-front{background:linear-gradient(145deg,#1a1a2e,#16213e);box-shadow:var(--shadow);border:1px solid rgba(255,255,255,.05)}
.card-back{background:linear-gradient(145deg,#16213e,#1a1a2e);box-shadow:var(--shadow);transform:rotateY(180deg);border:1px solid rgba(255,255,255,.05)}
.card-top-row{display:flex;justify-content:space-between;align-items:center;width:100%;margin-bottom:auto}
.card-category{font-size:.65em;color:var(--accent);text-transform:uppercase;letter-spacing:1px;opacity:.7}
.card-counter{font-size:.7em;color:var(--text2)}
.card-content{display:flex;flex-direction:column;align-items:center;justify-content:center;flex:1}
.card-word{font-size:1.75em;font-weight:600;line-height:1.35;margin-bottom:6px}
.card-hint{font-size:.85em;color:var(--text2);margin-top:6px;font-style:italic}
.card-example{font-size:.92em;color:var(--text2);margin-top:12px;padding-top:10px;border-top:1px solid rgba(255,255,255,.08);line-height:1.5;max-width:100%}
.card-example strong{color:var(--text);font-weight:500}
.tap-hint{position:absolute;bottom:16px;font-size:.7em;color:var(--text2);opacity:.5}
.bottom-bar{display:flex;gap:10px;margin:8px 0 4px;justify-content:center;align-items:center;flex-wrap:wrap}
.ans-btn{padding:10px 20px;border:none;border-radius:12px;font-size:.82em;font-weight:600;cursor:pointer;transition:.2s;min-width:90px}
.ans-btn:active{transform:scale(.95)}
.ans-btn.again{background:var(--red);color:#fff}
.ans-btn.hard{background:var(--orange);color:#333}
.ans-btn.good{background:var(--green);color:#fff}
.next-arrow{width:60px;height:60px;border-radius:50%;border:2px solid var(--card2);background:var(--card);color:var(--text);font-size:1.6em;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:.2s;flex-shrink:0}
.bottom-bar .next-arrow{width:70px;height:54px;border-radius:14px;font-size:1.5em}
.next-arrow:hover{border-color:var(--accent);background:rgba(233,69,96,.12);transform:scale(1.08)}
.next-arrow:active{transform:scale(.95)}
.progress-wrap{margin:8px 0;height:6px;background:var(--card);border-radius:3px;overflow:hidden}
.progress-fill{height:100%;background:linear-gradient(90deg,var(--accent),var(--green));border-radius:3px;transition:width .3s}
.quiz-options{display:flex;flex-direction:column;gap:10px;width:100%;max-width:500px;margin:16px auto}
.quiz-opt{padding:14px 20px;border:2px solid var(--card2);border-radius:14px;background:var(--card);color:var(--text);cursor:pointer;font-size:.95em;text-align:left;transition:.2s}
.quiz-opt:hover{border-color:var(--accent);background:rgba(233,69,96,.08)}
.quiz-opt.correct{border-color:var(--green);background:rgba(0,184,148,.15);color:var(--green)}
.quiz-opt.wrong{border-color:var(--red);background:rgba(225,112,85,.15);color:var(--red)}
.browse-list{flex:1;overflow-y:auto}
.browse-item{padding:14px 16px;background:var(--card);border-radius:12px;margin-bottom:8px;cursor:pointer;transition:.2s;border-left:3px solid transparent}
.browse-item:hover{border-left-color:var(--accent)}
.browse-item .pl{font-weight:600;margin-bottom:4px}
.browse-item .ru{font-size:.85em;color:var(--text2)}
.browse-item .status{float:right;font-size:.7em;padding:3px 8px;border-radius:8px;margin-left:8px}
.browse-item .status.new{background:rgba(233,69,96,.2);color:var(--accent)}
.browse-item .status.learning{background:rgba(253,203,110,.2);color:var(--orange)}
.browse-item .status.known{background:rgba(0,184,148,.2);color:var(--green)}
.filter-bar{display:flex;gap:6px;margin:10px 0;flex-wrap:wrap;align-items:center}
.filter-bar input{flex:1;min-width:150px;padding:8px 14px;border:2px solid var(--card2);border-radius:10px;background:var(--card);color:var(--text);font-size:.85em;outline:none}
.filter-bar input:focus{border-color:var(--accent)}
.filter-btn{padding:6px 12px;border:2px solid var(--card2);border-radius:10px;background:transparent;color:var(--text2);cursor:pointer;font-size:.75em;transition:.2s;white-space:nowrap}
.filter-btn.active{border-color:var(--accent);color:var(--text);background:rgba(233,69,96,.1)}
.session-done{text-align:center;padding:40px 20px}
.session-done h2{font-size:1.8em;margin-bottom:8px}
.session-done .emoji{font-size:3em;margin-bottom:16px}
.session-done p{color:var(--text2);margin-bottom:20px}
.restart-btn{padding:12px 32px;border:none;border-radius:12px;background:var(--accent);color:#fff;font-size:1em;font-weight:600;cursor:pointer;transition:.2s}
.restart-btn:hover{opacity:.9;transform:scale(1.02)}
.kbd-hints{text-align:center;font-size:.65em;color:var(--text2);opacity:.4;margin-top:4px}
.kbd{background:var(--card);padding:2px 6px;border-radius:4px;font-family:monospace}
@media(max-width:480px){
  .card-word{font-size:1.3em}
  .app{padding:10px;padding-top:env(safe-area-inset-top, 20px)}
  .stat{min-width:60px;padding:6px}
  .stat .num{font-size:1.1em}
  .ans-btn{padding:12px 20px;font-size:.85em;min-width:90px}
  .kbd-hints{display:none}
  .card-container{margin:2px 0;padding-top:4px}
  .flashcard{height:320px}
  .card-word{font-size:1.4em}
  .card-example{font-size:.8em}
  .header{padding:4px 0 2px}
  .header h1{font-size:1.4em}
  .progress-wrap{margin:4px 0}
  .bottom-bar{margin:4px 0 2px}
  .lang-toggle{margin-bottom:4px;margin-top:2px}
}
.cat-bar{display:flex;gap:6px;margin:4px 0 8px;overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none;padding:2px 0}
.cat-bar::-webkit-scrollbar{display:none}
.cat-pill{padding:5px 14px;border:1.5px solid var(--card2);border-radius:20px;background:transparent;color:var(--text2);cursor:pointer;font-size:.72em;transition:.2s;white-space:nowrap;flex-shrink:0}
.cat-pill:hover{border-color:var(--accent)}
.cat-pill.active{border-color:var(--accent);color:var(--text);background:rgba(233,69,96,.15)}
@keyframes fadeIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.fade-in{animation:fadeIn .3s ease}
</style>
</head>
<body>
<div class="app" id="app"></div>
<script>
// ============ POLISH CARDS ============
const CARDS_PL = [
// === Франкенштейн ===
["Nie móc znieść","Не мочь терпеть / не выносить","Nie mogę już znosić tego hałasu za oknem.","Я больше не могу терпеть этот шум за окном.","Франкенштейн"],
["Wątpić","Сомневаться","Czasami wątpię, czy kiedykolwiek opanuję polską gramatykę.","Иногда я сомневаюсь, освою ли когда-нибудь польскую грамматику.","Франкенштейн"],
["Wizje rozwiały się","Видения / иллюзии развеялись","Moje wątpliwości rozwiały się po rozmowie z księgową.","Мои сомнения развеялись после разговора с бухгалтером.","Франкенштейн"],
["Zaleta","Достоинство / плюс / преимущество","Główną zaletą tego mieszkania jest duży balkon.","Главное достоинство этой квартиры — большой балкон.","Франкенштейн"],
["Wątpliwość","Сомнение","Kupiłam te bilety do Madrytu bez żadnych wątpliwości.","Я купила эти билеты в Мадрид без всяких сомнений.","Франкенштейн"],
["Żal","Сожаление / печаль / жаль","Mam wielki żal, że nie pojechaliśmy wczoraj nad morze.","Мне очень жаль, что мы не поехали вчера на море.","Франкенштейн"],
["Postęp","Прогресс / продвижение","Cieszę się z twojego postępu w nauce języka — mówisz coraz lepiej!","Я рада твоему прогрессу в изучении языка — ты говоришь всё лучше!","Франкенштейн"],
["W rzeczywistości","В действительности / На самом деле","Wyglądał na spokojnego, ale w rzeczywistości bardzo się denerwował.","Он выглядел спокойным, но в действительности очень нервничал.","Франкенштейн"],
["Nie do pomyślenia","Немыслимо","Wyjść z domu bez śniadania to dla mnie nie do pomyślenia.","Выйти из дома без завтрака для меня немыслимо.","Франкенштейн"],
["Zdrowy rozsądek","Здравый смысл","Wystarczy odrobina zdrowego rozsądku, żeby nie klikać w podejrzane linki.","Достаточно капли здравого смысла, чтобы не кликать по подозрительным ссылкам.","Франкенштейн"],
["Stosunek","Отношение (к кому-либо)","Mam bardzo dobry stosunek do moich sąsiadów.","У меня очень хорошее отношение к моим соседям.","Франкенштейн"],
["Na samo wspomnienie","При одном только воспоминании","Na samo wspomnienie tego obiadu w restauracji robi mi się niedobrze.","При одном воспоминании об этом обеде в ресторане мне становится дурно.","Франкенштейн"],
["Nie móc się przemóc","Не мочь заставить себя, не мочь пересилить себя","Wiem, że muszę nagrać to wideo, ale jakoś nie mogę się przemóc, żeby usiąść przed kamerą.","Знаю, что нужно записать это видео, но как-то не могу заставить себя сесть перед камерой.","Франкенштейн"],
["Zaniedbać (coś / kogoś)","Запустить (что-то), пренебречь (чем-то), забросить","Ostatnio miałam bardzo dużo pracy i trochę zaniedbałam sport.","В последнее время у меня было очень много работы, и я немного забросила спорт.","Франкенштейн"],
["Nie bierz mi za złe","Не обижайся / не держи зла","Nie bierz mi za złe, ale ta sukienka ci nie pasuje.","Не обижайся, но это платье тебе не идёт.","Франкенштейн"],
["Im więcej... tym bardziej...","Чем больше... тем более...","Im więcej używam wtyczek AI, tym bardziej oszczędzam czas.","Чем больше я использую ИИ-плагины, тем больше экономлю время.","Франкенштейн"],
["Odwieść kogoś od (pomysłu/zamiaru)","Отговорить кого-то от (идеи/намерения)","Próbowałem odwieść ją od tego pomysłu, ale już podjęła decyzję.","Я пытался отговорить её от этой идеи, но она уже приняла решение.","Франкенштейн"],
["Na skutek...","В результате... / Из-за...","Nasz lot do Hiszpanii został opóźniony na skutek silnej burzy.","Наш рейс в Испанию был задержан из-за сильной бури.","Франкенштейн"],
["Serce się ściska","Сердце сжимается (от сильных эмоций, сожаления или грусти)","Serce mi się ściska, kiedy muszę wycinać z wywiadu tak dobre fragmenty.","У меня сердце сжимается, когда приходится вырезать из интервью такие хорошие фрагменты.","Франкенштейн"],
["Zapowiadać się pomyślnie","Обещать быть успешным","Ten nowy projekt wideo zapowiada się bardzo pomyślnie.","Этот новый видеопроект обещает быть очень успешным.","Франкенштейн"],
["Wysokie stoki","Высокие склоны","Z hotelu widać było wysokie stoki pokryte śniegiem.","Из отеля были видны высокие склоны, покрытые снегом.","Франкенштейн"],
["Zwłaszcza gdy...","Особенно когда...","Lubię pracować rano, zwłaszcza gdy w biurze jest jeszcze cicho.","Я люблю работать утром, особенно когда в офисе еще тихо.","Франкенштейн"],
["Wysiłki muszą być uwieńczone powodzeniem","Усилия должны увенчаться успехом","Wierzę, że nasze wysiłki muszą być uwieńczone powodzeniem — za dużo pracy w to włożyliśmy.","Верю, что наши усилия должны увенчаться успехом — слишком много труда мы в это вложили.","Франкенштейн"],
["Pochłonięty","Поглощенный / увлеченный","Byłam wczoraj całkowicie pochłonięta nowym serialem i zapomniałam o kolacji.","Вчера я была полностью поглощена новым сериалом и забыла про ужин.","Франкенштейн"],
["Przynajmniej","По крайней мере / хотя бы","Zgubiłam się w drodze do muzeum, ale przynajmniej wypiłam świetną kawę.","Я потерялась по пути в музей, но по крайней мере выпила отличный кофе.","Франкенштейн"],
["Zysk","Прибыль, выгода","Zysk z tego projektu przekroczył nasze oczekiwania.","Прибыль от этого проекта превысила наши ожидания.","Франкенштейн"],
["Skupić się / Skupiać się","Сосредоточиться / сосредотачиваться","Nie mogę się skupić na pracy, kiedy sąsiad wieci ścianę.","Не могу сосредоточиться на работе, когда сосед сверлит стену.","Франкенштейн"],
["Zaledwie","Едва / Всего лишь","Do oddania projektu zostało zaledwie kilka dni.","До сдачи проекта осталось всего лишь несколько дней.","Франкенштейн"],
["Zdawać sobie sprawę","Отдавать себе отчет / понимать","Zdaję sobie sprawę, że to auto jest drogie, ale bardzo mi się podoba.","Я понимаю, что это авто дорогое, но оно мне очень нравится.","Франкенштейн"],
["Niewłaściwy","Неподходящий / неправильный","Kupiłam buty w niewłaściwym rozmiarze.","Я купила обувь неподходящего размера.","Франкенштейн"],
["Usiłować","Пытаться / Стараться","Usiłuję otworzyć ten słoik z dżemem, ale zakrętka się zacięła.","Я пытаюсь открыть эту банку с джемом, но крышка застряла.","Франкенштейн"],
["Sięgnąć po coś","Потянуться (за чем-то) / взять / дотянуться","Sięgnęłam po telefon, żeby sprawdzić powiadomienia.","Я потянулась за телефоном, чтобы проверить уведомления.","Франкенштейн"],
["Zawsze byłam przekonana, że...","Я всегда была убеждена, что...","Zawsze byłam przekonana, że automatyzacja biznesu to klucz do rozwoju.","Я всегда была убеждена, что автоматизация бизнеса — это ключ к развитию.","Франкенштейн"],
["Ścigać","Преследовать / гнаться","Mój kot uwielbia ścigać muchy po całym mieszkaniu.","Мой кот обожает гоняться за мухами по всей квартире.","Франкенштейн"],
["Mieć obawy co do czegoś","Иметь опасения / сомневаться","Mam obawy co do tego nowego pracownika — jest za mało doświadczony.","У меня есть опасения насчёт этого нового сотрудника — у него слишком мало опыта.","Франкенштейн"],
["Tak czy owak","Так или иначе, в любом случае","Zróbmy to teraz, tak czy owak będziemy musieli to skończyć przed weekendem.","Давай сделаем это сейчас, так или иначе нам придётся закончить это до выходных.","Франкенштейн"],
["Ku mojemu zdumieniu","К моему удивлению","Ku mojemu zdumieniu, sklep był jeszcze otwarty o dziesiątej wieczorem.","К моему удивлению, магазин был ещё открыт в десять вечера.","Франкенштейн"],
["Niechby nawet...","Но пусть бы даже... / Даже если бы...","Niechby nawet padało, i tak pójdziemy na spacer.","Даже если бы пошел дождь, мы все равно пойдем на прогулку.","Франкенштейн"],
["O ile to jest w ogóle możliwe","Насколько это вообще возможно","Chciałabym dostać zwrot pieniędzy, o ile to jest w ogóle możliwe.","Я бы хотела получить возврат денег, если это вообще возможно.","Франкенштейн"],
["Nie do zniesienia","Невыносимый / невыносимо","Ten letni upał w mieście jest po prostu nie do zniesienia.","Эта летняя жара в городе просто невыносима.","Франкенштейн"],
["Chodzić po głowie","Крутиться в голове, приходить на ум, не давать покоя","Ta piosenka chodzi mi po głowie przez cały dzień.","Эта песня крутится у меня в голове весь день.","Франкенштейн"],
["Zwrócić się na dawne tory","Вернуться в прежнее русло","Po urlopie życie zwróciło się na dawne tory.","После отпуска жизнь вернулась в прежнее русло.","Франкенштейн"],
["Postępować naprzód","Продвигаться вперед","Remont naszej nowej kuchni w końcu postępuje naprzód.","Ремонт нашей новой кухни наконец-то продвигается вперед.","Франкенштейн"],
["Bądź pewna, że...","Будь уверена, что...","Bądź pewna, że paczka dotrze przed weekendem.","Будь уверена, что посылка придёт до выходных.","Франкенштейн"],

["Odpędzać od siebie myśli","Отгонять от себя мысли","Próbuję odpędzać od siebie myśli o pracy, kiedy jestem na wakacjach.","Пытаюсь отгонять от себя мысли о работе, когда я в отпуске.","Левиафан"],
["Nie marnować czasu","Не терять время зря","Nie marnuj czasu na scrollowanie — lepiej pójdź na spacer.","Не трать время на скроллинг — лучше сходи на прогулку.","Левиафан"],
["W innym wypadku","В противном случае","Musisz zapłacić fakturę do piątku, w innym wypadku naliczą odsetki.","Нужно оплатить счёт до пятницы, в противном случае начислят проценты.","Левиафан"],
["Przejść do rzeczy","Перейти к делу / к сути","Nie traćmy czasu, przejdźmy do rzeczy — ile to będzie kosztować?","Не будем терять время, перейдём к делу — сколько это будет стоить?","Левиафан"],
["Nie obejdzie się bez...","Не обойтись без...","Na tym spotkaniu nie obejdzie się bez tłumacza — nikt nie mówi po angielsku.","На этой встрече не обойтись без переводчика — никто не говорит по-английски.","Левиафан"],
["Niejednokrotnie podejmowała próby","Неоднократно предпринимала попытки","Niejednokrotnie podejmowałam próby rzucenia cukru, ale ciągle wracam do słodyczy.","Я неоднократно предпринимала попытки бросить сахар, но постоянно возвращаюсь к сладкому.","Левиафан"],
["Uprzejmie odpowiedział","Вежливо ответил","Kelner uprzejmie odpowiedział, że niestety nie ma już wolnych stolików.","Официант вежливо ответил, что, к сожалению, свободных столиков больше нет.","Левиафан"],
["Nawiasem mówiąc","Между прочим","Nawiasem mówiąc, ten sklep ma promocję do końca tygodnia.","Между прочим, в этом магазине акция до конца недели.","Левиафан"],
["Pomyślnie","Успешно / благополучно","Operacja przebiegła pomyślnie — lekarz jest zadowolony.","Операция прошла успешно — врач доволен.","Левиафан"],
["Zresztą","Впрочем / кстати","Nie chcę tam iść, zresztą jestem zmęczona.","Я не хочу туда идти, к тому же я устала.","Левиафан"],
["Ogarnięty (czymś)","Охваченный (чем-то)","Była ogarnięta paniką, kiedy nie mogła znaleźć paszportu na lotnisku.","Она была охвачена паникой, когда не могла найти паспорт в аэропорту.","Левиафан"],
["Na razie","Пока / на данный момент","To na razie wystarczy, resztę dokończymy jutro.","Этого пока достаточно, остальное доделаем завтра.","Левиафан"],
["Zmieszać się","Смутиться / прийти в замешательство","Kiedy szef pochwalił mnie przy wszystkich, kompletnie się zmieszałam.","Когда шеф похвалил меня при всех, я совершенно смутилась.","Левиафан"],
["Na wszelki wypadek","На всякий случай","Weź parasol na wszelki wypadek, bo prognoza nie jest pewna.","Возьми зонт на всякий случай, потому что прогноз неточный.","Левиафан"],
["Nie ma się co oszukiwać","Нечего себя обманывать","Nie ma się co oszukiwać — ta dieta nie działa, muszę zmienić podejście.","Нечего себя обманывать — эта диета не работает, надо менять подход.","Левиафан"],
["Maczać w czymś palce","Быть замешанным в чем-то","Podejrzewam, że sąsiad maczał palce w zniknięciu mojej paczki.","Подозреваю, что сосед был замешан в пропаже моей посылки.","Левиафан"],
["Nadal","Всё ещё / по-прежнему","Nadal czekam na odpowiedź z urzędu — minął już miesiąc.","Я всё ещё жду ответа из учреждения — прошёл уже месяц.","Левиафан"],
["Zachowuje niewzruszony spokój","Сохраняет невозмутимое спокойствие","Mój mąż zawsze zachowuje niewzruszony spokój, nawet w korku na autostradzie.","Мой муж всегда сохраняет невозмутимое спокойствие, даже в пробке на автостраде.","Левиафан"],
["Im dłużej... tym większą...","Чем дольше... тем больше...","Im dłużej tu mieszkam, tym większą czuję więź z tym miastem.","Чем дольше я тут живу, тем большую связь чувствую с этим городом.","Левиафан"],
["Natychmiast","Немедленно, тотчас","Musisz natychmiast wrócić do domu — zadzwonił hydraulik.","Ты должен немедленно вернуться домой — звонил сантехник.","Левиафан"],
["Dojść do siebie","Прийти в себя, оправиться","Po grypie potrzebowałam tygodnia, żeby dojść do siebie.","После гриппа мне понадобилась неделя, чтобы прийти в себя.","Левиафан"],
["Nie uląkł się trudności","Он не испугался трудностей","Nie uląkłam się trudności i otworzyłam własną firmę.","Я не испугалась трудностей и открыла свою фирму.","Левиафан"],
["Nie wolno odnosić się z pogardą","Нельзя относиться с презрением","Nie wolno odnosić się z pogardą do ludzi, którzy zarabiają mniej od nas.","Нельзя относиться с презрением к людям, которые зарабатывают меньше нас.","Левиафан"],
["Nie mam żadnego pomysłu","У меня нет никакой идеи","Nie mam żadnego pomysłu, co kupić mamie na urodziny.","У меня нет никакой идеи, что купить маме на день рождения.","Левиафан"],
["Uważać kogoś za","Считать кого-то кем-то","Uważam go za najlepszego fryzjera w okolicy.","Считаю его лучшим парикмахером в округе.","Левиафан"],

["Nie ma się czego obawiać","Нечего бояться / не о чем беспокоиться","Nie ma się czego obawiać — to tylko rutynowe badanie.","Нечего бояться — это просто плановое обследование.","General"],
["Perfidny uwodziciel","Коварный соблазнитель","Okazał się perfidnym uwodzicielem — pisał do trzech dziewczyn naraz.","Он оказался коварным соблазнителем — писал трём девушкам одновременно.","General"],

["Bowiem","Ведь / поскольку / ибо","Nie mogę przyjść na imprezę, jestem bowiem na dyżurze w pracy.","Не могу прийти на вечеринку, я ведь на дежурстве на работе.","General"],
["Zaś","Же / а / в свою очередь","Ja piję czarną kawę, mój mąż zaś woli z mlekiem.","Я пью чёрный кофе, мой муж же предпочитает с молоком.","General"],
["Oskarżenie","Обвинение","Oskarżenie było bezpodstawne i sąd je odrzucił.","Обвинение было безосновательным, и суд его отклонил.","General"],
["Ściągnąć na siebie uwagę","Привлечь к себе внимание","Jej głośny śmiech od razu ściągnął na nią uwagę całej sali.","Её громкий смех сразу привлёк к ней внимание всего зала.","General"],
["Skazać","Осудить / приговорить / обречь","Sąd skazał go na dwa lata więzienia.","Суд приговорил его к двум годам тюрьмы.","General"],
["Obawiać się","Опасаться / страшиться / побаиваться","Obawiam się burzy, więc dzisiaj wieczorem zostanę w domu.","Я боюсь грозы, поэтому сегодня вечером останусь дома.","General"],

["Mieć obawy przed","Иметь опасения перед (чем-то) / побаиваться","Zawsze mam pewne obawy przed wizytą u dentysty.","У меня всегда есть опасения перед визитом к стоматологу.","General"],

["Ścigać","Преследовать / гнаться (физически) / разыскивать","Mój pies uwielbia biegać po lesie i ścigać wiewiórki.","Мой пёс обожает бегать по лесу и гоняться за белками.","General"],
["Wycofać się z (czegoś)","Отказаться от (чего-то) / выйти из (планов) — Dopełniacz: z czego?","Moja siostra wycofała się z naszego wspólnego wyjazdu do Grecji, więc muszę lecieć sama.","Моя сестра отказалась от нашей совместной поездки в Грецию, поэтому мне придётся лететь одной.","General"],

["Wspinać się po / na","Взбираться / карабкаться / заниматься скалолазанием","Uwielbiam w weekendy jeździć na południe i wspinać się na wysokie szczyty.","Обожаю по выходным ездить на юг и взбираться на высокие вершины.","General"],
["Ponieważ","Так как / поскольку / потому что","Ponieważ jest zimno, założyłam kurtkę i szalik.","Так как холодно, я надела куртку и шарф.","General"],
["Dążyć do (celu)","Стремиться к (цели)","Konsekwentnie dążę do swojego celu.","Я последовательно стремлюсь к своей цели.","General"],

["Ścigać się","Соревноваться / бегать наперегонки (возвратная форма!)","Chłopcy zawsze chcą się ze mną ścigać na basenie.","Мальчики всегда хотят соревноваться со мной в бассейне.","General"],

["Zagłada","Гибель / уничтожение / погибель","W tym filmie superbohaterowie muszą uratować świat przed całkowitą zagładą.","В этом фильме супергерои должны спасти мир от полного уничтожения.","General"],

    ui: {nw:'New',lr:'Learning',kn:'Known',cards:'Cards',quiz:'Quiz',list:'List',search:'Search...',all:'All',done:'Session complete!',newSession:'New session',reset:'Reset progress',resetConfirm:'Reset all progress?',again:'Again',hard:'Hard',good:'Know',count:c=>c+' cards',passed:'Done',know:'Know',hardL:'Hard',againL:'Again',skipped:'Skipped',correct:'correct',noRatings:'No ratings',nowa:'New',uczenie:'Learning',znana:'Known'}
  }
};

let currentLang = localStorage.getItem('flashcards_lang') || 'pl';
let progress = {};
let currentMode = 'study';
let currentDir = 'dir1'; // dir1=RU->target, dir2=target->RU
let deck = [];
let deckIdx = 0;
let flipped = false;
let sessionStats = {total:0, good:0, hard:0, again:0, skipped:0};
let quizAnswer = null;
let quizOptions = null;
let searchQuery = '';
let filterStatus = 'all';
let activeCategory = null;
let editingCardId = null;

function L() { return LANGS[currentLang]; }
function getEdits() { try { return JSON.parse(localStorage.getItem(currentLang+'_edits')) || {}; } catch { return {}; } }
function saveEdits(e) { localStorage.setItem(currentLang+'_edits', JSON.stringify(e)); }
function allCards() {
  const edits = getEdits();
  return L().cards.map(c => {
    const e = edits[c.id];
    return e ? {...c, w1:e.w1??c.w1, w2:e.w2??c.w2, ex1:e.ex1??c.ex1, ex2:e.ex2??c.ex2} : c;
  });
}
function cards() { return activeCategory ? allCards().filter(c => c.cat === activeCategory) : allCards(); }
function getCategories() { const cats=[]; allCards().forEach(c=>{if(c.cat&&!cats.includes(c.cat))cats.push(c.cat)}); return cats; }

function loadProgress() { try { return JSON.parse(localStorage.getItem(L().key)) || {}; } catch { return {}; } }
function saveProgress(p) { localStorage.setItem(L().key, JSON.stringify(p)); }
function saveCardEdit(id) {
  const edits = getEdits();
  edits[id] = {
    w1: document.getElementById('edit-w1').value.trim(),
    w2: document.getElementById('edit-w2').value.trim(),
    ex1: document.getElementById('edit-ex1').value.trim(),
    ex2: document.getElementById('edit-ex2').value.trim()
  };
  saveEdits(edits);
  editingCardId = null;
  render();
}

function switchLang(lang) {
  currentLang = lang;
  localStorage.setItem('flashcards_lang', lang);
  progress = loadProgress();
  activeCategory = null;
  buildDeck();
  quizAnswer = null;
  searchQuery = '';
  filterStatus = 'all';
  render();
}
function setCategory(cat) {
  activeCategory = cat;
  buildDeck();
  quizAnswer = null;
  quizOptions = null;
  render();
}

function getStatus(id) {
  const p = progress[id];
  if (!p || !p.reviews) return 'new';
  if ((p.interval||0) >= 7) return 'known';
  return 'learning';
}
function isDue(id) {
  const p = progress[id];
  if (!p || !p.reviews) return true;
  const interval = (p.interval || 0) * 24 * 60 * 60 * 1000;
  return Date.now() - (p.lastReview || 0) >= interval;
}
function getStats() {
  let n=0,l=0,k=0;
  cards().forEach(c => { const s=getStatus(c.id); if(s==='new')n++;else if(s==='learning')l++;else k++; });
  return {new:n,learning:l,known:k,total:cards().length};
}
function shuffle(arr) {
  const a=[...arr]; for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];} return a;
}
function buildDeck() {
  const cc = cards();
  const nw=cc.filter(c=>getStatus(c.id)==='new');
  const dueLr=cc.filter(c=>getStatus(c.id)==='learning' && isDue(c.id));
  const dueKn=cc.filter(c=>getStatus(c.id)==='known' && isDue(c.id));
  let pool=[];
  pool.push(...shuffle(dueLr));
  pool.push(...shuffle(dueKn));
  const newSlots = Math.max(0, 15 - pool.length);
  if(newSlots > 0) pool.push(...shuffle(nw).slice(0, newSlots));
  if(!pool.length) pool=shuffle([...cc]).slice(0,15);
  deck=shuffle(pool).slice(0,20);
  deckIdx=0; flipped=false;
  sessionStats={total:0,good:0,hard:0,again:0,skipped:0};
}
function getFront(card) {
  const ll = L();
  if(currentDir==='dir1') return {text:card.w2,lang:'RU',hint:ll.dir1hint};
  return {text:card.w1,lang:ll.l1,hint:ll.dir2hint};
}
function getBack(card) {
  const ll = L();
  if(currentDir==='dir1') return {text:card.w1,lang:ll.l1};
  return {text:card.w2,lang:'RU'};
}

function render() {
  const app=document.getElementById('app');
  const stats=getStats();
  const ll = L();
  let html=`
    <div class="lang-toggle">
      <button class="lang-btn ${currentLang==='pl'?'active':''}" onclick="switchLang('pl')">\u{1F1F5}\u{1F1F1} Polski</button>
      <button class="lang-btn ${currentLang==='en'?'active':''}" onclick="switchLang('en')">\u{1F1EC}\u{1F1E7} English</button>
    </div>
    <div class="header">
      <h1>${ll.title}</h1>
      <div class="sub">${ll.sub(cards().length)}</div>
    </div>
    <div class="stats-bar">
      <div class="stat red"><div class="num">${stats.new}</div><div class="label">${ll.ui.nw}</div></div>
      <div class="stat orange"><div class="num">${stats.learning}</div><div class="label">${ll.ui.lr}</div></div>
      <div class="stat green"><div class="num">${stats.known}</div><div class="label">${ll.ui.kn}</div></div>
    </div>
    <div class="modes">
      <button class="mode-btn ${currentMode==='study'?'active':''}" onclick="setMode('study')"><span class="icon">&#x1F4DA;</span>${ll.ui.cards}</button>
      <button class="mode-btn ${currentMode==='quiz'?'active':''}" onclick="setMode('quiz')"><span class="icon">&#x2753;</span>${ll.ui.quiz}</button>
      <button class="mode-btn ${currentMode==='browse'?'active':''}" onclick="setMode('browse')"><span class="icon">&#x1F4CB;</span>${ll.ui.list}</button>
    </div>`;

  if(currentMode!=='browse') {
    html+=`
    <div class="directions">
      <button class="dir-btn ${currentDir==='dir1'?'active':''}" onclick="setDir('dir1')">${ll.dir1label}</button>
      <button class="dir-btn ${currentDir==='dir2'?'active':''}" onclick="setDir('dir2')">${ll.dir2label}</button>
    </div>`;
  }

  const cats = getCategories();
  if(cats.length > 0) {
    html+=`<div class="cat-bar">
      <button class="cat-pill ${activeCategory===null?'active':''}" onclick="setCategory(null)">${ll.ui.all}</button>`;
    cats.forEach(cat => {
      html+=`<button class="cat-pill ${activeCategory===cat?'active':''}" onclick="setCategory('${cat.replace(/'/g,"\\'")}')">${cat}</button>`;
    });
    html+=`</div>`;
  }

  if(currentMode==='study') html+=renderStudy();
  else if(currentMode==='quiz') html+=renderQuiz();
  else html+=renderBrowse();
  app.innerHTML=html;
  autoSizeCard();
}
function autoSizeCard(){}

function renderStudy() {
  if(!deck.length) buildDeck();
  if(deckIdx>=deck.length) return renderDone();
  const card=deck[deckIdx];
  const front=getFront(card);
  const back=getBack(card);
  const pct=deck.length>0?Math.round((deckIdx/deck.length)*100):0;

  let backExtra='';
  if(card.ex1) {
    backExtra=`<div class="card-example"><strong>${card.ex1}</strong><br>${card.ex2}</div>`;
  }

  const catLabel = card.cat ? card.cat : '';

  let html=`
    <div class="progress-wrap"><div class="progress-fill" style="width:${pct}%"></div></div>
    <div class="card-container" onclick="flipCard()">
      <div class="flashcard ${flipped?'flipped':''}" id="flashcard">
        <div class="card-face card-front">
          <div class="card-top-row"><div class="card-category">${front.lang}${catLabel?' • '+catLabel:''}</div><div class="card-counter">${deckIdx+1} / ${deck.length}</div></div>
          <div class="card-content"><div class="card-word">${front.text}</div><div class="card-hint">${front.hint}</div></div>
          <div class="tap-hint">&#x1F447; tap to flip</div>
        </div>
        <div class="card-face card-back">
          <div class="card-top-row"><div class="card-category">${back.lang}${catLabel?' • '+catLabel:''}</div><div class="card-counter">${deckIdx+1} / ${deck.length}</div></div>
          <div class="card-content"><div class="card-word">${back.text}</div>${backExtra}</div>
        </div>
      </div>
    </div>
    <div class="bottom-bar fade-in">`;

  if(flipped) {
    html+=`
      <button class="ans-btn hard" onclick="event.stopPropagation();answer(1)">&#x1F914; ${L().ui.hard}</button>
      <button class="ans-btn good" onclick="event.stopPropagation();answer(2)">&#x2705; ${L().ui.good}</button>`;
  }

  html+=`
      <button class="next-arrow" onclick="event.stopPropagation();skipCard()" title="Дальше (без оценки)">&#x27A1;</button>
    </div>
    <div class="kbd-hints"><span class="kbd">Space</span> flip &nbsp; <span class="kbd">&#x2192;</span> next &nbsp; <span class="kbd">1</span> again <span class="kbd">2</span> hard <span class="kbd">3</span> good</div>`;
  return html;
}

function renderQuiz() {
  if(!deck.length) buildDeck();
  if(deckIdx>=deck.length) return renderDone();
  const card=deck[deckIdx];
  const front=getFront(card);
  const ll = L();
  const pct=deck.length>0?Math.round((deckIdx/deck.length)*100):0;

  if(!quizOptions || quizOptions._cardId!==card.id) {
    let opts=[card];
    // Smart distractors: prefer same category
    const allC = allCards();
    const sameCat = shuffle(allC.filter(c=>c.id!==card.id && c.cat && c.cat===card.cat));
    const otherCat = shuffle(allC.filter(c=>c.id!==card.id && (!c.cat || c.cat!==card.cat)));
    for(let i=0;opts.length<4&&i<sameCat.length;i++) opts.push(sameCat[i]);
    for(let i=0;opts.length<4&&i<otherCat.length;i++) opts.push(otherCat[i]);
    opts=shuffle(opts);
    opts._cardId=card.id;
    quizOptions=opts;
  }

  const dirLabel = currentDir==='dir1' ? ll.l1 : 'RU';

  let html=`
    <div class="progress-wrap"><div class="progress-fill" style="width:${pct}%"></div></div>
    <div style="text-align:center;padding:24px 0 16px">
      <div style="font-size:.75em;color:var(--text2);margin-bottom:10px">${front.lang} &#x2192; ${dirLabel} &nbsp; (${deckIdx+1}/${deck.length})</div>
      <div class="card-word" style="font-size:1.5em">${front.text}</div>
    </div>
    <div class="quiz-options">`;

  quizOptions.forEach((opt,i) => {
    if(opt._cardId) return;
    const back=getBack(opt);
    let cls='';
    if(quizAnswer!==null){
      if(opt.id===card.id) cls='correct';
      else if(quizAnswer===i&&opt.id!==card.id) cls='wrong';
    }
    const dis=quizAnswer!==null?'pointer-events:none':'';
    html+=`<div class="quiz-opt ${cls}" style="${dis}" onclick="quizSelect(${i},${opt.id===card.id})">${back.text}</div>`;
  });

  html+=`</div>`;
  if(quizAnswer!==null) {
    let ex='';
    if(card.ex1) ex=`<div style="text-align:center;margin-top:10px;font-size:.82em;color:var(--text2)"><strong style="color:var(--text)">${card.ex1}</strong><br>${card.ex2}</div>`;
    html+=ex+`<div style="text-align:center;margin-top:12px"><button class="next-arrow" onclick="nextQuiz()" style="display:inline-flex">&#x27A1;</button></div>`;
  }
  return html;
}

function renderBrowse() {
  let filtered=cards();
  if(searchQuery){const q=searchQuery.toLowerCase();filtered=filtered.filter(c=>c.w1.toLowerCase().includes(q)||c.w2.toLowerCase().includes(q));}
  if(filterStatus!=='all') filtered=filtered.filter(c=>getStatus(c.id)===filterStatus);
  let html=`
    <div class="filter-bar">
      <input type="text" placeholder="${L().ui.search}" value="${searchQuery}" oninput="searchQuery=this.value;render()">
      <button class="filter-btn ${filterStatus==='all'?'active':''}" onclick="filterStatus='all';render()">${L().ui.all}</button>
      <button class="filter-btn ${filterStatus==='new'?'active':''}" onclick="filterStatus='new';render()">${L().ui.nw}</button>
      <button class="filter-btn ${filterStatus==='learning'?'active':''}" onclick="filterStatus='learning';render()">${L().ui.lr}</button>
      <button class="filter-btn ${filterStatus==='known'?'active':''}" onclick="filterStatus='known';render()">${L().ui.kn}</button>
    </div>
    <div style="font-size:.75em;color:var(--text2);margin-bottom:8px">${L().ui.count(filtered.length)}</div>
    <div class="browse-list">`;

  filtered.forEach(c => {
    const s=getStatus(c.id);
    const sC=s==='new'?'new':s==='learning'?'learning':'known';
    const sL=s==='new'?L().ui.nowa:s==='learning'?L().ui.uczenie:L().ui.znana;
    const catBadge = c.cat ? `<span style="font-size:.65em;color:var(--accent);opacity:.6;margin-left:6px">${c.cat}</span>` : '';
    const isEditing = editingCardId === c.id;
    if(isEditing) {
      html+=`
      <div class="browse-item" style="border-left-color:var(--accent)">
        <div style="display:flex;flex-direction:column;gap:6px">
          <label style="font-size:.65em;color:var(--text2)">Word / Phrase</label>
          <input id="edit-w1" value="${c.w1.replace(/"/g,'&quot;')}" style="padding:8px;border:1px solid var(--card2);border-radius:8px;background:var(--bg);color:var(--text);font-size:.9em">
          <label style="font-size:.65em;color:var(--text2)">Translation</label>
          <input id="edit-w2" value="${c.w2.replace(/"/g,'&quot;')}" style="padding:8px;border:1px solid var(--card2);border-radius:8px;background:var(--bg);color:var(--text);font-size:.9em">
          <label style="font-size:.65em;color:var(--text2)">Example</label>
          <input id="edit-ex1" value="${(c.ex1||'').replace(/"/g,'&quot;')}" style="padding:8px;border:1px solid var(--card2);border-radius:8px;background:var(--bg);color:var(--text);font-size:.85em">
          <label style="font-size:.65em;color:var(--text2)">Example (RU)</label>
          <input id="edit-ex2" value="${(c.ex2||'').replace(/"/g,'&quot;')}" style="padding:8px;border:1px solid var(--card2);border-radius:8px;background:var(--bg);color:var(--text);font-size:.85em">
          <div style="display:flex;gap:8px;margin-top:4px">
            <button onclick="saveCardEdit(${c.id})" style="flex:1;padding:8px;border:none;border-radius:8px;background:var(--green);color:#fff;font-weight:600;cursor:pointer">&#x2705; Save</button>
            <button onclick="editingCardId=null;render()" style="flex:1;padding:8px;border:none;border-radius:8px;background:var(--card2);color:var(--text);cursor:pointer">Cancel</button>
          </div>
        </div>
      </div>`;
    } else {
      html+=`
      <div class="browse-item" onclick="this.querySelector('.detail').style.display=this.querySelector('.detail').style.display==='none'?'block':'none'">
        <span class="status ${sC}">${sL}</span>
        <div class="pl">${c.w1}${catBadge}</div>
        <div class="ru">${c.w2}</div>
        <div class="detail" style="display:none;margin-top:8px;padding-top:8px;border-top:1px solid rgba(255,255,255,.08)">
          ${c.ex1?`<div style="font-size:.82em;color:var(--text2)"><strong style="color:var(--text)">${c.ex1}</strong><br>${c.ex2}</div>`:''}
          <button onclick="event.stopPropagation();editingCardId=${c.id};render()" style="margin-top:8px;padding:6px 14px;border:1px solid var(--accent);border-radius:8px;background:transparent;color:var(--accent);font-size:.75em;cursor:pointer">&#x270F;&#xFE0F; Edit</button>
        </div>
      </div>`;
    }
  });

  html+=`</div>`;
  if(Object.keys(progress).length>0){
    html+=`<div style="text-align:center;margin-top:16px"><button class="restart-btn" onclick="if(confirm('${L().ui.resetConfirm}')){progress={};saveProgress(progress);render()}" style="background:var(--card);border:1px solid var(--red);padding:8px 20px;font-size:.8em">&#x1F5D1; ${L().ui.reset}</button></div>`;
  }
  return html;
}

function renderDone() {
  const rated=sessionStats.good+sessionStats.hard+sessionStats.again;
  const pct=rated>0?Math.round((sessionStats.good/rated)*100):0;
  const emoji=pct>=80?'&#x1F389;':pct>=50?'&#x1F44D;':'&#x1F4AA;';
  return `
    <div class="session-done fade-in">
      <div class="emoji">${emoji}</div>
      <h2>${L().ui.done}</h2>
      <p>${L().ui.passed}: ${sessionStats.total} &bull; ${L().ui.know}: ${sessionStats.good} &bull; ${L().ui.hardL}: ${sessionStats.hard} &bull; ${L().ui.skipped}: ${sessionStats.skipped}</p>
      <div style="margin-bottom:20px">
        <div class="progress-wrap" style="height:10px"><div class="progress-fill" style="width:${pct}%;background:${pct>=80?'var(--green)':pct>=50?'var(--orange)':'var(--red)'}"></div></div>
        <div style="font-size:.8em;color:var(--text2);margin-top:4px">${rated>0?pct+'% '+L().ui.correct:L().ui.noRatings}</div>
      </div>
      <button class="restart-btn" onclick="buildDeck();render()">&#x1F504; ${L().ui.newSession}</button>
    </div>`;
}

function setMode(m){currentMode=m;if(m!=='browse')buildDeck();quizAnswer=null;quizOptions=null;render();}
function setDir(d){currentDir=d;buildDeck();quizAnswer=null;quizOptions=null;render();}
function flipCard(){flipped=!flipped;render();}

function skipCard() {
  sessionStats.skipped++;
  sessionStats.total++;
  deckIdx++;
  flipped=false;
  render();
}

function answer(score) {
  const card=deck[deckIdx];
  const p=progress[card.id]||{score:0,reviews:0,interval:0};
  p.reviews++;
  const prev = p.interval || 0;
  if(score===0){
    p.interval=0; p.score=Math.max(0,p.score-1); sessionStats.again++;
  } else if(score===1){
    p.interval = Math.max(1, Math.round(prev * 1.2)) || 1;
    p.score=Math.min(p.score+1,5); sessionStats.hard++;
  } else {
    if(prev===0) p.interval=1;
    else if(prev===1) p.interval=3;
    else p.interval=Math.round(prev*2.5);
    p.score=Math.min(p.score+2,5); sessionStats.good++;
  }
  p.lastReview=Date.now();
  progress[card.id]=p;
  saveProgress(progress);
  sessionStats.total++;
  if(score===0){const later=Math.min(deckIdx+3+Math.floor(Math.random()*4),deck.length);deck.splice(later,0,card);}
  deckIdx++;flipped=false;render();
}

function quizSelect(idx,correct) {
  quizAnswer=idx;
  const card=deck[deckIdx];
  const p=progress[card.id]||{score:0,reviews:0,interval:0};
  p.reviews++;
  const prev = p.interval || 0;
  if(correct){
    if(prev===0) p.interval=1;
    else if(prev===1) p.interval=3;
    else p.interval=Math.round(prev*2.5);
    p.score=Math.min(p.score+2,5); sessionStats.good++;
  } else {
    p.interval=0; p.score=Math.max(0,p.score-1); sessionStats.again++;
  }
  p.lastReview=Date.now();
  progress[card.id]=p;
  saveProgress(progress);
  sessionStats.total++;
  render();
}
function nextQuiz(){quizAnswer=null;quizOptions=null;deckIdx++;render();}

document.addEventListener('keydown',e=>{
  if(currentMode==='study'){
    if(e.code==='Space'){e.preventDefault();flipCard();}
    if(e.code==='ArrowRight'){e.preventDefault();skipCard();}
    if(flipped&&e.key==='1')answer(1);
    if(flipped&&e.key==='2')answer(1);
    if(flipped&&e.key==='3')answer(2);
  }
  if(currentMode==='quiz'&&quizAnswer!==null){
    if(e.code==='Space'||e.code==='Enter'||e.code==='ArrowRight'){e.preventDefault();nextQuiz();}
  }
});

// Init
progress = loadProgress();
buildDeck();render();

if('serviceWorker' in navigator){
  navigator.serviceWorker.register('sw.js').catch(()=>{});
}
</script>
</body>
</html>
